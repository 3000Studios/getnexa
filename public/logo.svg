<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 48" width="160" height="48">
  <defs>
    <linearGradient id="lgA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset=".5" stop-color="#5b8cff"/>
      <stop offset="1" stop-color="#24d1a1"/>
    </linearGradient>
    <linearGradient id="lgB" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#ff5b6b"/>
      <stop offset="1" stop-color="#ffb020"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <!-- diamond mark containing N -->
    <path d="M24 4 L44 24 L24 44 L4 24 Z" fill="url(#lgA)" stroke="url(#lgB)" stroke-width="1.5" opacity=".95"/>
    <path d="M14 32 L14 16 L18 16 L30 28 L30 16 L34 16 L34 32 L30 32 L18 20 L18 32 Z" fill="#0b0f1a"/>
    <!-- dot accent -->
    <circle cx="40" cy="10" r="2.6" fill="url(#lgB)"/>
  </g>
  <!-- wordmark -->
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="900" letter-spacing="-0.02em">
    <text x="56" y="31" font-size="22" fill="#ffffff">NEXA</text>
    <text x="112" y="31" font-size="22" fill="url(#lgA)">.</text>
    <text x="56" y="44" font-size="9" letter-spacing="0.35em" fill="#8a94b2">A  R  C  A  D  E</text>
  </g>
</svg>
